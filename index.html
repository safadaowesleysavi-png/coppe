<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Cooperativa v2.0</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #eef2f3; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .saldo-container { text-align: center; font-size: 2rem; font-weight: bold; color: #2c3e50; margin: 15px 0; }
        input { width: calc(100% - 20px); padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-add { background-color: #2ecc71; color: white; }
        .btn-remove { background-color: #e74c3c; color: white; }
        .btn-save { background-color: #3498db; color: white; width: 100%; margin-top: 5px; }
        ul { list-style: none; padding: 0; }
        li { background: #f9f9f9; padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; margin-bottom: 5px; }
        .btn-del { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; margin-left: 10px; }
        li a { text-decoration: none; color: #3498db; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h2>Saldo da Cooperativa</h2>
            <div class="saldo-container">R$ <span id="valorSaldo">0.00</span></div>
            <input type="number" id="inputValor" placeholder="Valor (Ex: 100)">
            <div class="btn-group">
                <button class="btn-add" onclick="alterarSaldo('adicionar')">Adicionar (+)</button>
                <button class="btn-remove" onclick="alterarSaldo('remover')">Remover (-)</button>
            </div>
        </div>

        <div class="card">
            <h2>Cadastrar Matrícula</h2>
            <input type="text" id="novoNome" placeholder="Nome do Associado">
            <input type="text" id="novaMatricula" placeholder="Nº da Matrícula">
            <input type="text" id="novoLink" placeholder="Link do PDF (Google Drive)">
            <button class="btn-save" onclick="adicionarAssociado()">Salvar no Sistema</button>
        </div>

        <div class="card">
            <h2>Associados Ativos</h2>
            <ul id="listaAssociados"></ul>
        </div>
    </div>

    <script>
        // 1. CARREGAR DADOS
        let bd = JSON.parse(localStorage.getItem('bancoCooperativa')) || { saldo: 0, associados: [] };

        function atualizarTela() {
            // Atualiza Saldo
            document.getElementById('valorSaldo').innerText = bd.saldo.toFixed(2);

            // Atualiza Lista
            const lista = document.getElementById('listaAssociados');
            lista.innerHTML = "";

            bd.associados.forEach((pessoa, index) => {
                lista.innerHTML += `
                    <li>
                        <div>
                            <strong>${pessoa.nome}</strong><br>
                            <small>Mat: ${pessoa.matricula}</small>
                        </div>
                        <div>
                            <a href="${pessoa.link}" target="_blank">PDF</a>
                            <button class="btn-del" onclick="removerAssociado(${index})">Deletar</button>
                        </div>
                    </li>
                `;
            });

            // SALVAR NO NAVEGADOR
            localStorage.setItem('bancoCooperativa', JSON.stringify(bd));
        }

        // 2. FUNÇÕES DE DINHEIRO
        function alterarSaldo(operacao) {
            const valor = parseFloat(document.getElementById('inputValor').value);
            if (isNaN(valor)) return alert("Digite um número!");
            
            bd.saldo = (operacao === 'adicionar') ? bd.saldo + valor : bd.saldo - valor;
            
            document.getElementById('inputValor').value = "";
            atualizarTela();
        }

        // 3. FUNÇÃO DE ADICIONAR
        function adicionarAssociado() {
            const nome = document.getElementById('novoNome').value;
            const mat = document.getElementById('novaMatricula').value;
            const link = document.getElementById('novoLink').value;

            if (!nome || !mat) return alert("Preencha os dados!");

            bd.associados.push({ nome: nome, matricula: mat, link: link || "#" });
            
            document.getElementById('novoNome').value = "";
            document.getElementById('novaMatricula').value = "";
            document.getElementById('novoLink').value = "";
            
            atualizarTela();
        }

        // 4. FUNÇÃO DE DELETAR (A que você pediu!)
        function removerAssociado(index) {
            if (confirm("Deseja realmente excluir este associado?")) {
                bd.associados.splice(index, 1); // Remove o item da lista
                atualizarTela(); // Atualiza a tela e o LocalStorage
            }
        }

        // Inicia o sistema
        atualizarTela();
    </script>
</body>
</html>
